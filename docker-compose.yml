services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: basetrack
      POSTGRES_PASSWORD: password
      POSTGRES_DB: basetrack
    ports:
      - "5433:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - tunnel_network

  tracker:
    image: basetrack-tracker:latest
    ports:
      - "3000:3000"
    env_file:
      - apps/tracker/.env
    environment:
      - DATABASE_URL=postgresql://basetrack:password@db:5432/basetrack?schema=public
    depends_on:
      - db
    networks:
      - tunnel_network

  cron:
    image: basetrack-cron:latest
    env_file:
      - apps/tracker/.env
    environment:
      - DATABASE_URL=postgresql://basetrack:password@db:5432/basetrack?schema=public
    depends_on:
      - db
    networks:
      - tunnel_network

